version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:latest-jdk17
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      JENKINS_OPTS: "--httpListenAddress=0.0.0.0 --httpPort=8080"
      JAVA_OPTS: "-Xmx2g -Xms1g"
    networks:
      - ci-cd-network
    restart: unless-stopped

volumes:
  jenkins_data:
    driver: local

networks:
  ci-cd-network:
    driver: bridge
